name: Keep Supabase Active

on:
  schedule:
    # Run every 5 days at 9am UTC (antes do limite de 7 dias)
    - cron: '0 9 */5 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Check project status (prevents pause)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            "https://api.supabase.com/v1/projects/qyikubuqyhobppvojvpa")
          echo "Project status: $STATUS"
          if [ "$STATUS" -eq 200 ]; then
            echo "Project is active"
          else
            echo "Warning: Could not verify project status"
          fi