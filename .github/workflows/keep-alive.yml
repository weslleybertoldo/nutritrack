name: Keep Supabase Active

on:
  schedule:
    # 4x/dia. Criterio oficial do auto-pause NAO e "qualquer atividade reseta
    # o contador" — e "sufficient user database activity... a few user
    # requests to the database EACH DAY over the previous week"
    # (docs/guides/platform/free-project-pausing). Ping a cada 3 dias falhou:
    # runs verdes em 28/06 e 01/07 e o projeto pausou em 04/07/2026.
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Pings REST/PostgREST (atividade que CONTA p/ o auto-pause)
        run: |
          set -e
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5aWt1YnVxeWhvYnBwdm9qdnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODM5NDUsImV4cCI6MjA4OTU1OTk0NX0.YYhbW3KrkXtBDBb4Wpnvfrbl8hzb8-ixet54prpD6_U"
          # 3 queries por run x 4 runs/dia = ~12 queries/dia ("a few each day")
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "apikey: $ANON" \
              -H "Authorization: Bearer $ANON" \
              "https://qyikubuqyhobppvojvpa.supabase.co/rest/v1/foods?select=id&limit=$i")
            echo "NutriTrack REST ping $i/3: HTTP $CODE"
            [ "$CODE" = "200" ] || (echo "ERRO" && exit 1)
            sleep 2
          done

      - name: Executar SQL real no Postgres (camada extra)
        run: |
          set -e
          RES=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT 1 as alive, now() as ts"}' \
            "https://api.supabase.com/v1/projects/qyikubuqyhobppvojvpa/database/query")
          CODE=$(echo "$RES" | tail -1)
          BODY=$(echo "$RES" | sed '$d')
          echo "NutriTrack SQL ping: HTTP $CODE | $BODY"
          [ "$CODE" = "200" ] || [ "$CODE" = "201" ] || (echo "ERRO" && exit 1)
