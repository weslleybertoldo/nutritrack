name: Keep Supabase Active

on:
  schedule:
    # Run every 5 days at 9am UTC (antes do limite de 7 dias)
    - cron: '0 9 */5 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send health ping to prevent pause
        run: |
          # Management API check - ativa o projeto
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            "https://api.supabase.com/v1/projects/qyikubuqyhobppvojvpa")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Project status check: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "NutriTrack project is healthy and active"